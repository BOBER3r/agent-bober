# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
      # Runs all tests including tests/e2e/four-modes.test.ts (Sprint 27 correctness gate).
      # Runtime <5min (11 e2e tests complete in ~800ms; full suite in ~5s).
      - run: npm run test

  kpi-gate:
    name: KPI Gate (informational — see TODO)
    runs-on: ubuntu-latest
    needs: build-and-test
    # TODO(0.13.0): remove continue-on-error to make this job blocking
    # before the 0.13.0 release ships. Until then this job is informational
    # and a failing gate must NOT block merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run KPI gate (fixture mode in CI)
        env:
          # CI runs the gate in fixture mode using the most recent
          # token-usage.jsonl committed to the repo (or env-injected
          # baseline/gated values for synthetic runs). Real-pipeline
          # gating is deferred to manual post-merge runs.
          KPI_GATE_THRESHOLD: "40"
        run: node scripts/run-kpi-gate.mjs --use-fixtures
      - name: Upload KPI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-gate-report
          path: .bober/graph/kpi-gate-report.json
